# ============================================================
# MAPPO Training Configuration — MuJoCo 3 physics backend
#
# Usage:
#   python -m training.train_mappo \
#       --config training/config_mujoco.yaml --sim mujoco
#
# Key differences from config.yaml (HomeEnv):
#   - 3 drones (scene XML has 3 bodies)
#   - max_steps=600: physics takes real time to traverse 10m
#   - spawn_z=1.0: spawn at task height so policy learns
#     horizontal navigation first, not just z-climbing
#   - obs_noise_std=0.0: remove noise — MuJoCo physics already
#     provides natural variability; noise + physics = too hard
#   - rollout_steps=4096: longer rollouts give better value
#     estimates when task completions are sparse
#   - entropy_coef=0.003: prevent log_std from growing unchecked
#     (observed entropy >6.5 = pure noise at 260 updates)
#   - total_timesteps=5_000_000: physics at 2000 steps/sec →
#     ~40 min on CPU; check task completion at update 100
# ============================================================

env:
  n_drones: 3
  max_steps: 600
  spawn_z: 1.0                 # spawn at task height, not floor
  obs_noise_std: 0.0           # no extra noise — physics provides variability
  coop_time_threshold: 0.7

model:
  obs_dim: 15
  act_dim: 4
  actor_hidden: [256, 256]
  critic_hidden: [512, 256]

training:
  total_timesteps: 5_000_000
  rollout_steps: 4096          # longer rollouts → better GAE value estimates
  mini_batch_size: 256
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coef: 0.003          # low: prevents log_std explosion (was 0.01, saw entropy >7)
  value_coef: 0.5
  max_grad_norm: 0.5
  lr_actor: 1.0e-4             # conservative: prevents overshooting with dense shaping
  lr_critic: 5.0e-4
  normalise_rewards: true
  device: "auto"

curriculum:
  enabled: false               # reward shaping handles curriculum implicitly

logging:
  log_interval: 10
  eval_interval: 50
  eval_episodes: 3
  checkpoint_interval: 100
  checkpoint_dir: "checkpoints"
  use_wandb: false
  wandb_project: "drone-swarm-mujoco"
  wandb_entity: null

# ============================================================
# Phase 3 — Bid Policy Training (unchanged from config.yaml)
# ============================================================
bid_policy:
  hidden: [64, 64]
  lr: 3.0e-4
  lr_value: 1.0e-3
  log_std_init: -1.0
  clip_eps: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  n_epochs: 4
  mini_batch_size: 256
  gamma: 0.99
  gae_lambda: 0.95
  n_updates: 200
  episodes_per_update: 8
  eval_interval: 20
  checkpoint_interval: 50
